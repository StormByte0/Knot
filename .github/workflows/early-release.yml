# Early Release — on-demand VSIX build for Patreon early-access drops.
#
# Triggered manually (workflow_dispatch) or by push to the early-release
# branch. Produces platform-specific VSIX packages WITHOUT cutting a
# GitHub Release or tagging the repo — the VSIX files are attached as
# workflow artifacts that the maintainer downloads and ships to Patreon.
#
# Difference vs. release.yml:
#   - No `on: push: tags` trigger — works without a git release
#   - No `release` job — no draft release is created
#   - Artifacts are kept for 90 days under the workflow run
#   - Optional `pre_release` input controls the --pre-release flag
#     (default true, since Patreon drops are usually beta builds)

name: Early Release

on:
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Flag VSIX as pre-release (beta) for Marketplace Pre-release tab"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - early-release

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Build the webview once — platform-independent static assets.
  # ─────────────────────────────────────────────────────────────────────
  build-webview:
    name: Build webview (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/webview/package-lock.json

      - name: Install webview dependencies
        run: npm ci
        working-directory: extensions/vscode/webview

      - name: Build webview
        run: npm run build
        working-directory: extensions/vscode/webview

      - name: Upload webview assets
        uses: actions/upload-artifact@v5
        with:
          name: webview-assets
          path: extensions/vscode/media/storymap/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────
  # Build platform-specific VSIX packages.
  # Matrix mirrors release.yml minus darwin-x64 (removed — too slow).
  # ─────────────────────────────────────────────────────────────────────
  build-platform:
    name: Build ${{ matrix.target }}
    needs: build-webview
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            binary: knot-server.exe
          - target: darwin-arm64
            runner: macos-14
            rust-target: aarch64-apple-darwin
            binary: knot-server
          - target: linux-x64
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            binary: knot-server
          - target: linux-arm64
            runner: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            binary: knot-server
            cross: true

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Download webview assets
        uses: actions/download-artifact@v5
        with:
          name: webview-assets
          path: extensions/vscode/media/storymap/

      # ── Rust setup ───────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust-target }}

      # ── Cross-compilation setup (linux-arm64 only) ───────────────────
      - name: Install cross toolchain (linux-arm64 only)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross linker (linux-arm64 only)
        if: matrix.cross
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      # ── Build Rust server ─────────────────────────────────────────────
      - name: Build Rust server (release)
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Copy binary to extension bin/
        shell: bash
        run: |
          mkdir -p extensions/vscode/bin
          cp "target/${{ matrix.rust-target }}/release/${{ matrix.binary }}" \
             "extensions/vscode/bin/${{ matrix.binary }}"

      # ── Extension setup ───────────────────────────────────────────────
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install extension dependencies
        run: npm ci
        working-directory: extensions/vscode

      - name: Compile TypeScript
        run: npm run compile
        working-directory: extensions/vscode

      # ── Package VSIX ──────────────────────────────────────────────────
      # --pre-release is configurable via workflow_dispatch input so the
      # same workflow can ship either beta or stable Patreon drops.
      - name: Package VSIX
        shell: bash
        run: |
          PRE_FLAG=""
          if [ "${{ github.event.inputs.pre_release || 'true' }}" = "true" ]; then
            PRE_FLAG="--pre-release"
          fi
          npx vsce package $PRE_FLAG --target ${{ matrix.target }} --allow-missing-repository
        working-directory: extensions/vscode

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: vsix-${{ matrix.target }}
          path: extensions/vscode/*.vsix
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # Roll-up: download every platform VSIX and re-upload as a single
  # artifact so the maintainer grabs one zip for Patreon.
  # ─────────────────────────────────────────────────────────────────────
  bundle:
    name: Bundle all VSIX
    needs: build-platform
    runs-on: ubuntu-latest
    steps:
      - name: Download all VSIX files
        uses: actions/download-artifact@v5
        with:
          pattern: vsix-*
          merge-multiple: true
          path: vsix-files

      - name: List VSIX files
        run: ls -la vsix-files/

      - name: Zip bundle
        run: |
          cd vsix-files
          zip -j knot-early-release-${{ github.run_id }}.zip *.vsix
          ls -la

      - name: Upload bundled zip
        uses: actions/upload-artifact@v5
        with:
          name: knot-early-release-${{ github.run_id }}
          path: vsix-files/knot-early-release-${{ github.run_id }}.zip
          retention-days: 90
