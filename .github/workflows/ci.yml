name: Knot CI

on:
  push:
    branches: [ver_2, main]
  pull_request:
    branches: [ver_2, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Check
        run: cargo check --workspace --all-targets

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace

  build-vsix:
    name: Build VSIX (${{ matrix.target }})
    needs: [check, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-target: x86_64-pc-windows-msvc
            vsce-target: win32-x64
            runner: windows-latest
            binary: knot-server.exe

          - rust-target: x86_64-apple-darwin
            vsce-target: darwin-x64
            runner: macos-13
            binary: knot-server

          - rust-target: aarch64-apple-darwin
            vsce-target: darwin-arm64
            runner: macos-latest
            binary: knot-server

          - rust-target: x86_64-unknown-linux-gnu
            vsce-target: linux-x64
            runner: ubuntu-latest
            binary: knot-server

          - rust-target: aarch64-unknown-linux-gnu
            vsce-target: linux-arm64
            runner: ubuntu-latest
            binary: knot-server

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux ARM64 toolchain
        if: matrix.rust-target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust-target }}

      - name: Build release binary
        run: cargo build --release -p knot-server --target ${{ matrix.rust-target }}

      - name: Copy binary to extension
        shell: bash
        run: |
          mkdir -p extensions/vscode/bin
          cp target/${{ matrix.rust-target }}/release/${{ matrix.binary }} extensions/vscode/bin/
          chmod +x extensions/vscode/bin/${{ matrix.binary }} || true

      - name: Install Node.js dependencies
        run: |
          cd extensions/vscode
          npm install

      - name: Compile TypeScript
        run: |
          cd extensions/vscode
          npm run compile

      - name: Package VSIX
        run: |
          cd extensions/vscode
          npx vsce package --target ${{ matrix.vsce-target }} --allow-missing-repository

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: knot-${{ matrix.vsce-target }}
          path: extensions/vscode/*.vsix

  publish:
    name: Publish to Marketplace
    needs: build-vsix
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/ver_2' && github.event_name == 'push'
    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: knot-*
          path: vsix-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la vsix-artifacts/

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for vsix in vsix-artifacts/*.vsix; do
            echo "Publishing $vsix..."
            npx vsce publish --packagePath "$vsix"
          done
